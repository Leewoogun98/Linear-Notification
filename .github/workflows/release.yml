name: 배포

# v* 태그를 푸시하면(예: v0.1.0) mac/windows 인스톨러를 빌드해 GitHub Release로 올린다.
# Actions 탭에서 수동 실행(workflow_dispatch)하면 빌드 후 아티팩트만 남긴다(릴리스 없음).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: LinearApp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: LinearApp/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build installer (electron-builder)
        run: npm run dist
        env:
          # 미서명 빌드 — macOS 코드사이닝 자동탐색 끄기(인증서 없음)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            LinearApp/release/*.dmg
            LinearApp/release/*.exe
          if-no-files-found: error

  release:
    # 태그 푸시일 때만 릴리스 생성
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          generate_release_notes: true
