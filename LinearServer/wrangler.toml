name = "linear-noti-relay"
main = "src/worker.ts"
compatibility_date = "2024-06-20"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayDurableObject"

[[migrations]]
tag = "v1"
# 무료 플랜의 Durable Object는 SQLite 기반 스토리지 필요 (new_classes 대신 new_sqlite_classes)
new_sqlite_classes = ["RelayDurableObject"]

# 시크릿은 `wrangler secret put` 으로 등록:
#   LINEAR_WEBHOOK_SECRET  — Linear webhook 서명 검증용 (Linear가 webhook 생성 시 발급)
#   LINEAR_CLIENT_ID       — Linear OAuth 앱 client id
#   LINEAR_CLIENT_SECRET   — Linear OAuth 앱 client secret
